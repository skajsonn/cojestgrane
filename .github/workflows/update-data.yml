name: Aktualizacja danych

on:
  schedule:
    # Co 6 godzin — watchlisty/oceny na Letterboxd zmieniają się w ciągu dnia,
    # a CC potrafi dorzucić seanse (np. klasykę) po południu.
    # 03:45 UTC = 05:45 czasu polskiego (lato).
    - cron: "45 3,9,15,21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # margines: fetch fail-fastuje przy blokadzie, ale kalendarz (kuracja AI)
    # i sync bywają wolniejsze; 25 min chroni przed anulowaniem na 5xx Google
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Każde źródło jest niezależne (continue-on-error): przejściowa blokada
      # Cloudflare na jednym z nich nie może wykasować aktualizacji z pozostałych
      # ani zablokować commita. Nieświeżość widać w stopce strony.
      - name: Pobierz repertuar Cinema City (+ TMDB)
        id: repertoire
        continue-on-error: true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          # Worker jako droga awaryjna, gdy Cloudflare CC challenge'uje runner
          LB_PROXY_URL: https://cojestgrane-ai.yflsiemano.workers.dev/lb
          LB_PROXY_TOKEN: ${{ secrets.LB_PROXY_TOKEN }}
        run: node scripts/fetch-repertoire.mjs

      - name: Kalendarz premier (TMDB + kuracja AI)
        id: calendar
        continue-on-error: true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/fetch-calendar.mjs

      - name: Synchronizuj profile Letterboxd
        id: letterboxd
        continue-on-error: true
        env:
          # prywatne proxy na Cloudflare Workerze — IP runnerów bywa blokowane
          # przez Cloudflare Letterboxda, publiczne proxy są zawodne
          LB_PROXY_URL: https://cojestgrane-ai.yflsiemano.workers.dev/lb
          LB_PROXY_TOKEN: ${{ secrets.LB_PROXY_TOKEN }}
        run: node scripts/sync-letterboxd.mjs

      - name: Zatwierdź zmienione dane
        if: always()
        run: |
          git config user.name "kinomaniak-bot"
          git config user.email "actions@users.noreply.github.com"

          # Run startuje na commicie z chwili wyzwolenia, więc opóźniony cron
          # (albo drugi run odpalony minutę później) commitowałby na nieaktualnej
          # historii → push odrzucony jako non-fast-forward. Dlatego przed
          # commitem przenosimy HEAD na najnowszy origin/main; wygenerowane
          # pliki zostają nietknięte w katalogu roboczym (--soft).
          for attempt in 1 2 3; do
            git fetch --quiet origin main
            git reset --soft FETCH_HEAD
            git add data/
            if git diff --cached --quiet; then
              echo "Brak zmian w danych."
              exit 0
            fi
            git commit --quiet -m "dane: aktualizacja repertuaru i profilu $(date -u +%F)"
            if git push --quiet origin HEAD:main; then
              echo "Wypchnięto dane (próba $attempt)."
              exit 0
            fi
            echo "Push odrzucony — inny run zdążył wypchnąć. Ponawiam ($attempt/3)."
            git reset --soft HEAD~1   # cofamy commit, dane zostają w katalogu
            sleep 5
          done
          echo "::error::Nie udało się wypchnąć danych po 3 próbach."
          exit 1

      - name: Podsumowanie źródeł
        if: always()
        run: |
          echo "Repertuar:  ${{ steps.repertoire.outcome }}"
          echo "Kalendarz:  ${{ steps.calendar.outcome }}"
          echo "Letterboxd: ${{ steps.letterboxd.outcome }}"
          # Job pada tylko gdy WSZYSTKIE źródła zawiodły (realna awaria,
          # nie przejściowy Cloudflare) — wtedy warto dostać powiadomienie.
          if [ "${{ steps.repertoire.outcome }}" != "success" ] && \
             [ "${{ steps.calendar.outcome }}" != "success" ] && \
             [ "${{ steps.letterboxd.outcome }}" != "success" ]; then
            echo "::error::Wszystkie źródła danych zawiodły."
            exit 1
          fi
